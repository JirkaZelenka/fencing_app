{% extends 'base.html' %}
{% load static i18n_local %}

{% block title %}Wiki - Šermířská aplikace{% endblock %}

{% block extra_css %}
{{ block.super }}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
{% endblock %}

{% block content %}
<h1>{% tr "Wiki" %}</h1>

<div class="row mt-4 justify-content-center">
    <div class="col-lg-6 col-md-8">
        <div class="guide-tiles-grid-2x2">
            <a href="{% url 'guides_glossary' %}" class="guide-tile card text-decoration-none">
                <div class="card-body text-center">
                    <div class="guide-icon mb-2">
                        <i class="ti ti-book-2"></i>
                    </div>
                    <h6 class="card-title mb-0">Slovníček</h6>
                </div>
            </a>
            <a href="{% url 'guides_videos' %}" class="guide-tile card text-decoration-none">
                <div class="card-body text-center">
                    <div class="guide-icon mb-2">
                        <i class="ti ti-video"></i>
                    </div>
                    <h6 class="card-title mb-0">Videonávody</h6>
                </div>
            </a>
            <a href="{% url 'guides_rules' %}" class="guide-tile card text-decoration-none">
                <div class="card-body text-center">
                    <div class="guide-icon mb-2">
                        <i class="ti ti-file-text"></i>
                    </div>
                    <h6 class="card-title mb-0">Pravidla</h6>
                </div>
            </a>
            <a href="{% url 'guides_equipment_assembly' %}" class="guide-tile card text-decoration-none">
                <div class="card-body text-center">
                    <div class="guide-icon mb-2">
                        <i class="ti ti-tool"></i>
                    </div>
                    <h6 class="card-title mb-0">Technická část</h6>
                </div>
            </a>
        </div>
    </div>
</div>
{% endblock %}
